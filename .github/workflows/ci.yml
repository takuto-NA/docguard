name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install "${{ matrix.python-version }}"

      - name: Install dependencies
        run: |
          uv pip install --python "${{ matrix.python-version }}" -e ".[dev]"

      - name: Run pytest
        run: uv run --python "${{ matrix.python-version }}" pytest

      - name: Run docguard self-check
        run: uv run --python "${{ matrix.python-version }}" docguard README.md CONTEXT.md docs/ --summary

      - name: Build distributions
        run: uv run --python "${{ matrix.python-version }}" python -m build

      - name: Check distributions
        run: uv run --python "${{ matrix.python-version }}" python -m twine check dist/*

      - name: Run wheel smoke verification
        run: uv run --python "${{ matrix.python-version }}" python scripts/wheel_smoke.py
